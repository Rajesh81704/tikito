<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tikito - Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .payment-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo h1 {
            font-size: 28px;
            color: #4F46E5;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #6b7280;
            font-size: 14px;
            margin-top: 4px;
        }

        .booking-details {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #e5e7eb;
        }

        .booking-details h3 {
            font-size: 14px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-row .label {
            color: #6b7280;
            font-size: 14px;
        }

        .detail-row .value {
            color: #111827;
            font-weight: 600;
            font-size: 14px;
        }

        .amount-section {
            text-align: center;
            margin: 24px 0;
            padding: 20px;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            border-radius: 12px;
        }

        .amount-section .label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .amount-section .amount {
            color: #fff;
            font-size: 36px;
            font-weight: 700;
            margin-top: 4px;
        }

        .pay-btn {
            width: 100%;
            padding: 16px;
            background: #4F46E5;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pay-btn:hover {
            background: #4338CA;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }

        .pay-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .secure-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 16px;
            color: #6b7280;
            font-size: 12px;
        }

        .secure-badge svg {
            width: 14px;
            height: 14px;
        }

        .status-message {
            text-align: center;
            padding: 16px;
            border-radius: 10px;
            margin-top: 16px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }

        .status-message.success {
            display: block;
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .status-message.error {
            display: block;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(79, 70, 229, 0.2);
            border-radius: 50%;
            border-top-color: #4F46E5;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-top: 16px;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: #ecfdf5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-icon svg {
            width: 32px;
            height: 32px;
            color: #059669;
        }

        .redirect-text {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <div class="logo">
            <h1>Tikito</h1>
            <p>Turf Booking Payment</p>
        </div>

        <!-- Loading State -->
        <div id="loading-section">
            <div class="loading-text">
                <span class="loading-spinner"></span>
                Preparing your payment...
            </div>
        </div>

        <!-- Payment Section -->
        <div id="payment-section" style="display: none;">
            <div class="booking-details">
                <h3>Booking Summary</h3>
                <div class="detail-row">
                    <span class="label">Booking ID</span>
                    <span class="value" id="display-booking-id">—</span>
                </div>
                <div class="detail-row">
                    <span class="label">Order ID</span>
                    <span class="value" id="display-order-id">—</span>
                </div>
            </div>

            <div class="amount-section">
                <div class="label">Total Amount</div>
                <div class="amount" id="display-amount">₹0</div>
            </div>

            <button class="pay-btn" id="pay-btn" onclick="openRazorpay()">
                Pay Now
            </button>

            <div class="secure-badge">
                <svg fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                </svg>
                Secured by Razorpay
            </div>
        </div>

        <!-- Success State -->
        <div id="success-section" style="display: none;">
            <div class="success-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h2 style="text-align:center; color:#111827; margin-bottom:8px;">Payment Successful!</h2>
            <p style="text-align:center; color:#6b7280; font-size:14px;">Your booking has been confirmed.</p>
            <div class="redirect-text" id="redirect-text">Redirecting back to app...</div>
        </div>

        <div class="status-message" id="status-message"></div>
    </div>

    <script>
        /**
         * Payment Flow:
         * 
         * 1. App opens this page with query params:
         *    /pay?booking_id=xxx&token=xxx&redirect=tikito://payment-success
         * 
         * 2. Page calls create-order API to get Razorpay order
         * 3. Razorpay checkout opens automatically
         * 4. On success: verifies payment via API, then redirects back to app
         * 5. Razorpay webhook also confirms payment server-side (backup)
         */

        const API_BASE = window.location.origin;
        let orderData = null;

        // Parse URL params
        const params = new URLSearchParams(window.location.search);
        const bookingId = params.get("booking_id");
        const token = params.get("token");
        const redirectUrl = params.get("redirect") || null;
        const userName = params.get("name") || "";
        const userEmail = params.get("email") || "";
        const userPhone = params.get("phone") || "";

        // Auto-start payment flow
        window.addEventListener("DOMContentLoaded", () => {
            if (bookingId && token) {
                createOrder();
            } else {
                showSection("payment-section");
                showStatus("Missing booking_id or token in URL parameters.", "error");
                document.getElementById("loading-section").style.display = "none";
            }
        });

        async function createOrder() {
            try {
                const res = await fetch(`${API_BASE}/users/payment/create-order?booking_id=${encodeURIComponent(bookingId)}`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || "Failed to create order");
                }

                orderData = await res.json();

                // Show payment details
                document.getElementById("loading-section").style.display = "none";
                document.getElementById("payment-section").style.display = "block";
                document.getElementById("display-booking-id").textContent = orderData.booking_id;
                document.getElementById("display-order-id").textContent = orderData.order_id;
                document.getElementById("display-amount").textContent = `₹${(orderData.amount / 100).toFixed(2)}`;

                // Auto-open Razorpay checkout
                setTimeout(() => openRazorpay(), 500);

            } catch (err) {
                document.getElementById("loading-section").style.display = "none";
                document.getElementById("payment-section").style.display = "block";
                showStatus(err.message, "error");
            }
        }

        function openRazorpay() {
            if (!orderData) return;

            const options = {
                key: orderData.key,
                amount: orderData.amount,
                currency: orderData.currency,
                name: "Tikito",
                description: "Turf Booking Payment",
                order_id: orderData.order_id,
                handler: function (response) {
                    verifyPayment(response);
                },
                prefill: {
                    name: userName,
                    email: userEmail,
                    contact: userPhone
                },
                theme: {
                    color: "#4F46E5"
                },
                modal: {
                    ondismiss: function () {
                        showStatus("Payment cancelled. Tap 'Pay Now' to retry.", "error");
                    },
                    escape: false,
                    confirm_close: true
                },
                notes: {
                    booking_id: orderData.booking_id
                }
            };

            const rzp = new Razorpay(options);
            rzp.on("payment.failed", function (response) {
                showStatus(`Payment failed: ${response.error.description}`, "error");
            });
            rzp.open();
        }

        async function verifyPayment(response) {
            const btn = document.getElementById("pay-btn");
            btn.disabled = true;
            btn.textContent = "Verifying payment...";

            try {
                const res = await fetch(`${API_BASE}/users/payment/verify`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        booking_id: orderData.booking_id,
                        razorpay_order_id: response.razorpay_order_id,
                        razorpay_payment_id: response.razorpay_payment_id,
                        razorpay_signature: response.razorpay_signature
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || "Verification failed");
                }

                // Show success
                document.getElementById("payment-section").style.display = "none";
                document.getElementById("success-section").style.display = "block";

                // Redirect back to app after 2 seconds
                if (redirectUrl) {
                    document.getElementById("redirect-text").textContent = "Redirecting back to app in 2s...";
                    setTimeout(() => {
                        window.location.href = `${redirectUrl}?status=success&booking_id=${orderData.booking_id}&payment_id=${response.razorpay_payment_id}`;
                    }, 2000);
                } else {
                    document.getElementById("redirect-text").textContent = "You can close this page now.";
                }

            } catch (err) {
                showStatus(`Verification failed: ${err.message}. The webhook will confirm your payment shortly.`, "error");
                btn.disabled = false;
                btn.textContent = "Retry Verification";
            }
        }

        function showSection(id) {
            document.getElementById(id).style.display = "block";
        }

        function showStatus(message, type) {
            const el = document.getElementById("status-message");
            el.textContent = message;
            el.className = `status-message ${type}`;
        }
    </script>
</body>
</html>
