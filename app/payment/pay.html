<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Payment – Tikito</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            color: #111827;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 24px;
            border: 1px solid #f3f4f6;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            padding: 40px 32px;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #4F46E5;
            letter-spacing: -0.5px;
            margin-bottom: 28px;
        }

        .spinner-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .spinner {
            width: 52px;
            height: 52px;
            border: 4px solid #e0e7ff;
            border-top-color: #4F46E5;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 12px;
            color: #6b7280;
            font-weight: 500;
        }

        .badge svg {
            flex-shrink: 0;
        }

        .divider {
            height: 1px;
            background: #f3f4f6;
            margin: 28px 0;
        }

        .footer {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Tikito</div>

        <div class="spinner-wrap">
            <div class="spinner"></div>
        </div>

        <p class="title">Opening secure checkout…</p>
        <p class="subtitle">
            Please wait while we connect you to our payment partner. Do not close this window.
        </p>

        <div class="badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            256-bit SSL encrypted · Powered by Razorpay
        </div>

        <div class="divider"></div>
        <p style="font-size:12px;color:#9ca3af;">Your payment details are never stored on our servers.</p>
    </div>

    <p class="footer">© 2025 Tikito. All rights reserved.</p>

    <script>
        function getParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        function redirectToApp(path) {
            // Try custom scheme redirect
            window.location.replace(path);
            
            // Fallback: show success message if redirect doesn't work
            setTimeout(() => {
                document.querySelector(".spinner").style.display = "none";
                document.querySelector(".title").textContent = "Payment Successful ✓";
                document.querySelector(".subtitle").textContent = "You can close this window and return to the app.";
            }, 1500);
        }

        function startPayment() {
            const key = getParam("key");
            const amount = getParam("amount");
            const orderId = getParam("orderId");
            const bookingId = getParam("bookingId");
            const callbackUrl = getParam("callbackUrl");
            const token = getParam("token");

            if (!key || !amount || !orderId) {
                document.querySelector(".title").textContent = "Invalid payment link";
                document.querySelector(".subtitle").textContent = "Missing required parameters. Please go back and try again.";
                document.querySelector(".spinner").style.display = "none";
                return;
            }

            const options = {
                key,
                amount,
                currency: "INR",
                name: "Tikito",
                description: "Turf Booking Payment",
                order_id: orderId,
                handler: (response) => {
                    // Call verify endpoint synchronously to ensure it completes
                    const xhr = new XMLHttpRequest();
                    xhr.open("POST", "/users/payment/verify", false); // synchronous
                    xhr.setRequestHeader("Content-Type", "application/json");
                    xhr.send(JSON.stringify({
                        booking_id: bookingId,
                        razorpay_order_id: response.razorpay_order_id,
                        razorpay_payment_id: response.razorpay_payment_id,
                        razorpay_signature: response.razorpay_signature,
                    }));

                    // Redirect back to app
                    const appUrl = callbackUrl
                        ? `${callbackUrl}?orderId=${response.razorpay_order_id}&paymentId=${response.razorpay_payment_id}&signature=${response.razorpay_signature}&bookingId=${bookingId || ''}`
                        : `exp+tikito-player:///payment-success?orderId=${response.razorpay_order_id}&paymentId=${response.razorpay_payment_id}&signature=${response.razorpay_signature}&bookingId=${bookingId || ''}`;
                    redirectToApp(appUrl);
                },
                modal: {
                    ondismiss: () => {
                        const failUrl = callbackUrl
                            ? `${callbackUrl}?status=failed`
                            : "exp+tikito-player:///payment-failed";
                        redirectToApp(failUrl);
                    }
                },
                theme: { color: "#4F46E5" }
            };

            const rzp = new Razorpay(options);
            rzp.open();
        }

        window.onload = startPayment;
    </script>
</body>
</html>
