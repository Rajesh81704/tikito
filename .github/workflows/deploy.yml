name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}
            
            # Pull latest changes
            git pull origin main
            
            # Update nginx configuration if changed
            if [ -f nginx/tikito-api.conf ]; then
              # Check if nginx config has changed
              if ! diff -q nginx/tikito-api.conf /etc/nginx/conf.d/tikito-api.conf > /dev/null 2>&1; then
                echo "Nginx config changed, updating..."
                sudo cp nginx/tikito-api.conf /etc/nginx/conf.d/tikito-api.conf
                sudo nginx -t && sudo systemctl reload nginx
                echo "Nginx configuration updated and reloaded"
              else
                echo "Nginx config unchanged, skipping"
              fi
            fi
            
            # Activate virtual environment and install/update dependencies
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Restart the application
            sudo systemctl restart tikito
            
            echo "Deployment completed successfully!"
