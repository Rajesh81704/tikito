name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}
            
            # Pull latest changes
            git pull origin main
            
            # Activate virtual environment and install/update dependencies
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Restart the application
            # Option 1: If using systemd
            sudo systemctl restart tikito || true
            
            # Option 2: If using PM2 (uncomment if using PM2)
            # pm2 restart tikito || true
            
            # Option 3: If using supervisor (uncomment if using supervisor)
            # sudo supervisorctl restart tikito || true
            
            echo "Deployment completed successfully!"
